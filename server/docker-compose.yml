version: "3.8"

services:
  memos:
    image: neosmemo/memos:latest
    container_name: memos
    volumes:
      - ./data:/var/opt/memos
    ports:
      - "127.0.0.1:5230:5230"  # Only expose locally
    restart: always
    networks:
      - internal_network

  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    restart: always
    networks:
      - internal_network

networks:
  internal_network:
    driver: bridge